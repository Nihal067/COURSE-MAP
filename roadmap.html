<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap — CourseMap</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ======================================================
   FULL INLINE STYLES — No external CSS dependency issues
   ====================================================== */

        /* Reset */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #080a14;
            --bg2: #0e1028;
            --bg3: #0a0c1e;
            --border: rgba(255, 255, 255, 0.09);
            --t1: #f0f0f5;
            --t2: #a0a0c0;
            --t3: #666688;
            --green: #22c55e;
            --purple: #6366f1;
            --radius: 10px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--t1);
            line-height: 1.6;
            min-height: 100vh;
            /* NO overflow:hidden — let page scroll naturally */
        }

        a {
            color: #7b8cff;
            text-decoration: none;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            outline: none;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0c0e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 3px;
        }

        /* ======================================================
   NAV
   ====================================================== */
        .roadmap-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 32px;
            background: rgba(8, 10, 20, 0.98);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--t2);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.18s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            color: var(--t1);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-username {
            font-size: 13px;
            color: var(--t2);
        }

        .btn-signout {
            padding: 6px 13px;
            font-size: 12px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            border-radius: 6px;
            transition: background 0.18s;
        }

        .btn-signout:hover {
            background: rgba(239, 68, 68, 0.15);
        }

        /* ======================================================
   DOMAIN HEADER
   ====================================================== */
        .domain-header {
            padding: 36px 32px 28px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.09) 0%, transparent 65%);
            border-bottom: 1px solid var(--border);
        }

        .domain-header-inner {
            max-width: 820px;
        }

        .cat-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
        }

        .domain-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
            color: var(--t1);
        }

        .domain-meta {
            display: flex;
            gap: 18px;
            color: var(--t2);
            font-size: 13px;
            margin-bottom: 14px;
        }

        .domain-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-enroll {
            padding: 9px 22px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
            transition: all 0.2s;
        }

        .btn-enroll:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 22px rgba(99, 102, 241, 0.45);
        }

        .btn-enroll.enrolled {
            background: rgba(34, 197, 94, 0.1);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, 0.25);
            box-shadow: none;
        }

        /* ======================================================
   PROGRESS BAR
   ====================================================== */
        .prog-row {
            padding: 10px 32px;
            background: rgba(8, 10, 20, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .prog-inner {
            display: flex;
            align-items: center;
            gap: 14px;
            max-width: 820px;
        }

        .prog-label {
            font-size: 12px;
            color: var(--t3);
            min-width: 80px;
        }

        .prog-track {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 3px;
            overflow: hidden;
        }

        .prog-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--purple), var(--green));
            transition: width 0.5s ease;
            width: 0%;
        }

        .prog-pct {
            font-size: 13px;
            font-weight: 700;
            color: var(--green);
            min-width: 38px;
            text-align: right;
        }

        /* ======================================================
   FLOWCHART CANVAS
   ====================================================== */
        .flow-canvas {
            padding: 40px 32px 240px;
            /* 240px bottom so final nodes are never hidden */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 70vh;
            background: var(--bg);
        }

        /* Phase group header */
        .flow-phase {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 700px;
            margin: 32px 0 4px;
        }

        .flow-phase:first-child {
            margin-top: 0;
        }

        .flow-phase-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .flow-phase-label {
            padding: 3px 14px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--t3);
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
        }

        /* Node */
        .flow-node {
            width: 100%;
            max-width: 700px;
            cursor: pointer;
        }

        .flow-node-box {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 15px 18px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-left: 3.5px solid var(--node-color, var(--purple));
            border-radius: var(--radius);
            transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
        }

        .flow-node:hover .flow-node-box {
            background: #131630;
            border-color: rgba(255, 255, 255, 0.14);
            transform: translateX(5px);
            box-shadow: -4px 0 18px rgba(0, 0, 0, 0.4);
        }

        .flow-node.active-node .flow-node-box {
            background: rgba(99, 102, 241, 0.07);
            border-color: var(--node-color, var(--purple));
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
        }

        .flow-node.done-node .flow-node-box {
            border-left-color: var(--green);
            background: rgba(34, 197, 94, 0.04);
        }

        .node-check {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.14);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: transparent;
            transition: all 0.18s;
        }

        .done-node .node-check {
            border-color: var(--green);
            background: rgba(34, 197, 94, 0.14);
            color: var(--green);
        }

        .node-body {
            flex: 1;
            min-width: 0;
        }

        .node-step {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--node-color, var(--purple));
            margin-bottom: 2px;
        }

        .done-node .node-step {
            color: var(--green);
        }

        .node-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--t1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .node-desc {
            font-size: 11px;
            color: var(--t2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .node-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            flex-shrink: 0;
        }

        .node-dur {
            font-size: 10px;
            color: var(--t3);
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 9px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .node-chips {
            display: flex;
            gap: 4px;
        }

        .node-chip {
            font-size: 9px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--t3);
        }

        .node-arrow {
            font-size: 18px;
            color: var(--t3);
            line-height: 1;
            flex-shrink: 0;
            transition: transform 0.18s, color 0.18s;
        }

        .active-node .node-arrow {
            transform: rotate(90deg);
            color: var(--node-color, var(--purple));
        }

        /* Connector arrow between nodes */
        .flow-connector {
            width: 0;
            height: 28px;
            border-left: 2px dashed rgba(255, 255, 255, 0.09);
            margin: 0 auto;
            position: relative;
        }

        .flow-connector::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: -5px;
            width: 8px;
            height: 8px;
            border-right: 2px solid rgba(255, 255, 255, 0.12);
            border-bottom: 2px solid rgba(255, 255, 255, 0.12);
            transform: rotate(45deg);
        }

        /* ======================================================
   RESOURCE DRAWER
   ====================================================== */
        #drawer-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            z-index: 8000;
        }

        #drawer-overlay.show {
            display: block;
        }

        #res-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9000;
            background: #0c0e1f;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -24px 60px rgba(0, 0, 0, 0.8);
            transform: translateY(100%);
            transition: transform 0.36s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #res-drawer.show {
            transform: translateY(0);
        }

        .drawer-handle {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.16);
            border-radius: 2px;
            margin: 13px auto 0;
            cursor: pointer;
            flex-shrink: 0;
        }

        .drawer-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 13px 28px 12px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .drawer-info {
            flex: 1;
            min-width: 0;
        }

        .drawer-step-num {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--t3);
            margin-bottom: 3px;
        }

        .drawer-step-title {
            font-size: 19px;
            font-weight: 700;
            color: var(--t1);
            margin-bottom: 4px;
        }

        .drawer-step-desc {
            font-size: 13px;
            color: var(--t2);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .btn-mark-done {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: var(--t2);
            transition: all 0.18s;
        }

        .btn-mark-done:hover {
            background: rgba(34, 197, 94, 0.09);
            border-color: rgba(34, 197, 94, 0.28);
            color: var(--green);
        }

        .btn-mark-done.marked {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.28);
            color: var(--green);
        }

        .btn-close-drawer {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-left: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--t2);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.18s;
            line-height: 1;
        }

        .btn-close-drawer:hover {
            background: rgba(239, 68, 68, 0.14);
            color: #f87171;
        }

        /* Tabs */
        .drawer-tabs {
            display: flex;
            gap: 4px;
            padding: 10px 28px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .drawer-tabs::-webkit-scrollbar {
            display: none;
        }

        .res-tab {
            padding: 7px 16px;
            border-radius: 7px 7px 0 0;
            border: 1px solid transparent;
            border-bottom: none;
            background: transparent;
            color: var(--t3);
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.15s;
        }

        .res-tab:hover {
            color: var(--t2);
            background: rgba(255, 255, 255, 0.04);
        }

        .res-tab.active {
            color: var(--t1);
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.28);
        }

        /* Scrollable resource list */
        .drawer-content {
            overflow-y: auto;
            padding: 14px 28px 36px;
            flex: 1;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
        }

        .drawer-content::-webkit-scrollbar {
            width: 4px;
        }

        .drawer-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .res-section {
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .res-section.active {
            display: flex;
            animation: fadeUp 0.18s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .res-item {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 12px 14px;
            border-radius: 9px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            text-decoration: none;
            color: var(--t1);
            transition: all 0.15s;
        }

        .res-item:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateX(3px);
        }

        .res-item.r-courses:hover {
            border-color: rgba(99, 102, 241, 0.4);
            background: rgba(99, 102, 241, 0.06);
        }

        .res-item.r-videos:hover {
            border-color: rgba(239, 68, 68, 0.4);
            background: rgba(239, 68, 68, 0.06);
        }

        .res-item.r-books:hover {
            border-color: rgba(234, 179, 8, 0.4);
            background: rgba(234, 179, 8, 0.06);
        }

        .res-item.r-websites:hover {
            border-color: rgba(34, 197, 94, 0.4);
            background: rgba(34, 197, 94, 0.06);
        }

        .res-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .res-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }

        .res-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--t1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .res-plat {
            font-size: 11px;
            color: var(--t3);
        }

        .res-arrow {
            font-size: 10px;
            color: var(--t3);
            opacity: 0.4;
            flex-shrink: 0;
        }

        .badge-f {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .badge-p {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            background: rgba(234, 179, 8, 0.09);
            color: #fbbf24;
            border: 1px solid rgba(234, 179, 8, 0.2);
        }

        .no-res {
            font-size: 13px;
            color: var(--t2);
            font-style: italic;
            padding: 10px 0;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .roadmap-nav {
                padding: 10px 16px;
            }

            .domain-header {
                padding: 22px 16px 18px;
            }

            .domain-title {
                font-size: 20px;
            }

            .prog-row {
                padding: 8px 16px;
            }

            .flow-canvas {
                padding: 24px 12px 240px;
            }

            .node-desc {
                display: none;
            }

            .drawer-top {
                padding: 10px 16px 10px;
            }

            .drawer-content {
                padding: 12px 16px 28px;
            }

            .drawer-tabs {
                padding: 8px 16px 0;
            }

            #res-drawer {
                max-height: 90vh;
            }
        }
    </style>
</head>

<body>

    <!-- NAV -->
    <nav class="roadmap-nav">
        <a href="dashboard.html" class="back-btn">← Dashboard</a>
        <div class="nav-right">
            <span class="nav-username" id="nav-username"></span>
            <button class="btn-signout" id="btn-signout">Sign Out</button>
        </div>
    </nav>

    <!-- DOMAIN HEADER -->
    <section class="domain-header">
        <div class="domain-header-inner">
            <span class="cat-badge" id="domain-cat"></span>
            <h1 class="domain-title" id="domain-name-h1"></h1>
            <div class="domain-meta">
                <span id="meta-steps">0 Steps</span>
                <span id="meta-resources">0 Resources</span>
            </div>
            <button class="btn-enroll" id="btn-enroll">Enroll in Path</button>
        </div>
    </section>

    <!-- PROGRESS BAR -->
    <div class="prog-row">
        <div class="prog-inner">
            <span class="prog-label" id="prog-label">0 / 0 done</span>
            <div class="prog-track">
                <div class="prog-fill" id="prog-fill"></div>
            </div>
            <span class="prog-pct" id="prog-pct">0%</span>
        </div>
    </div>

    <!-- FLOWCHART CANVAS -->
    <main class="flow-canvas" id="flow-canvas"></main>

    <!-- DRAWER OVERLAY (backdrop) -->
    <div id="drawer-overlay"></div>

    <!-- RESOURCE DRAWER -->
    <div id="res-drawer">
        <div class="drawer-handle" id="drawer-handle"></div>
        <div class="drawer-top">
            <div class="drawer-info">
                <div class="drawer-step-num" id="drawer-step-num">Step 1</div>
                <div class="drawer-step-title" id="drawer-step-title"></div>
                <div class="drawer-step-desc" id="drawer-step-desc"></div>
                <div style="margin-top:4px">
                    <button class="btn-mark-done" id="btn-mark-done">○ Mark Complete</button>
                </div>
            </div>
            <button class="btn-close-drawer" id="btn-close-drawer">×</button>
        </div>
        <div class="drawer-tabs" id="drawer-tabs"></div>
        <div class="drawer-content" id="drawer-content"></div>
    </div>

    <!-- Hidden legacy IDs for JS fallback compatibility -->
    <div style="display:none">
        <span id="domain-category"></span>
        <h1 id="domain-name"></h1>
        <span id="domain-steps-count"></span>
        <span id="domain-courses-count"></span>
        <div id="domain-icon"></div>
        <span id="rp-label"></span>
        <div id="rp-fill"></div><span id="rp-pct"></span>
        <span id="sp-label"></span>
        <div id="sp-fill"></div><span id="sp-pct"></span>
        <div id="progress-fill"></div><span id="progress-text"></span><span id="progress-pct"></span>
        <div id="progress-icon"></div>
        <div id="fc-canvas"><!-- fallback --></div>
        <div id="drawer-backdrop"></div>
        <div id="resource-drawer">
            <div id="drawer-step-label"></div>
            <div id="drawer-title"></div>
            <div id="drawer-desc"></div><button id="drawer-complete-btn"></button>
            <button id="btn-close-drawer-2"></button>
            <div id="drawer-tab-bar"></div>
            <div id="drawer-body"></div>
            <div id="drawer-handle-2"></div>
        </div>
        <div id="user-display-name"></div>
        <button id="btn-logout"></button>
        <button id="btn-enroll-2"></button>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/data_govt.js"></script>
    <script src="js/data_more.js"></script>
    <script>
        /* ================================================================
           ROADMAP PAGE LOGIC — Complete self-contained inline script
           ================================================================ */

        const RES_ICONS = { courses: '🎓', videos: '▶', books: '📖', websites: '🌐' };
        const PHASES = ['Fundamentals', 'Core Concepts', 'Intermediate', 'Advanced', 'Specialization'];

        let _domain = null, _activeStep = null;

        /* ─── Init ─── */
        document.addEventListener('DOMContentLoaded', () => {
            try {
                if (!Auth.requireAuth()) return;

                const params = new URLSearchParams(window.location.search);
                const domainId = params.get('domain');
                const domain = (typeof DOMAINS !== 'undefined')
                    ? DOMAINS.find(d => d.id === domainId) : null;

                if (!domain) { window.location.href = 'dashboard.html'; return; }
                _domain = domain;

                const user = Auth.getCurrentUser();
                renderHeader(domain, user);
                initEnroll(domain, user);
                renderNodes(domain);
                refreshProgress(domain);
                setupDrawer(domain);

                document.getElementById('btn-signout').onclick = () => Auth.logout();
                const nu = document.getElementById('nav-username');
                if (nu) nu.textContent = user.name;

            } catch (err) {
                console.error('Roadmap init error:', err);
                document.body.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:center;
                      min-height:100vh;background:#080a14;color:#f0f0f5;
                      font-family:Inter,sans-serif;padding:24px;text-align:center;">
            <div>
              <div style="font-size:48px;margin-bottom:16px">⚠️</div>
              <h2 style="margin-bottom:8px">Roadmap failed to load</h2>
              <p style="color:#666;margin-bottom:20px;font-size:14px">${err.message}</p>
              <a href="dashboard.html"
                 style="padding:10px 24px;background:#6366f1;color:#fff;
                        border-radius:8px;text-decoration:none;font-weight:600">
                ← Back to Dashboard
              </a>
            </div>
          </div>`;
            }
        });

        /* ─── Header ─── */
        function renderHeader(domain, user) {
            const cat = document.getElementById('domain-cat');
            cat.textContent = domain.cat;
            cat.style.color = domain.color;

            document.getElementById('domain-name-h1').textContent = domain.name;
            document.title = domain.name + ' — CourseMap';

            const totalRes = domain.steps.reduce((s, st) =>
                s + (st.courses?.length || 0) + (st.videos?.length || 0)
                + (st.books?.length || 0) + (st.websites?.length || 0), 0);

            document.getElementById('meta-steps').textContent = '📌 ' + domain.steps.length + ' Steps';
            document.getElementById('meta-resources').textContent = '📚 ' + totalRes + ' Resources';
        }

        /* ─── Enroll ─── */
        function initEnroll(domain, user) {
            const btn = document.getElementById('btn-enroll');
            const key = 'courseMap_enrolled_' + user.email;
            let list = JSON.parse(localStorage.getItem(key) || '[]');
            styleEnroll(btn, list.includes(domain.id));
            btn.onclick = () => {
                list = JSON.parse(localStorage.getItem(key) || '[]');
                const has = list.includes(domain.id);
                list = has ? list.filter(x => x !== domain.id) : [...list, domain.id];
                localStorage.setItem(key, JSON.stringify(list));
                styleEnroll(btn, !has);
            };
        }
        function styleEnroll(btn, enrolled) {
            btn.textContent = enrolled ? '✓ Enrolled' : 'Enroll in Path';
            btn.classList.toggle('enrolled', enrolled);
        }

        /* ─── Progress ─── */
        function progressKey(domainId) {
            return 'courseMap_progress_' + Auth.getCurrentUser().email + '_' + domainId;
        }
        function getDone(domainId) {
            const d = localStorage.getItem(progressKey(domainId));
            return d ? JSON.parse(d) : [];
        }
        function toggleDone(domainId, idx) {
            const d = getDone(domainId);
            const i = d.indexOf(idx);
            if (i > -1) d.splice(i, 1); else d.push(idx);
            localStorage.setItem(progressKey(domainId), JSON.stringify(d));
            return d;
        }
        function refreshProgress(domain) {
            const done = getDone(domain.id);
            const total = domain.steps.length;
            const pct = total > 0 ? Math.round(done.length / total * 100) : 0;
            document.getElementById('prog-fill').style.width = pct + '%';
            document.getElementById('prog-pct').textContent = pct + '%';
            document.getElementById('prog-label').textContent = done.length + ' / ' + total + ' done';
        }

        /* ─── Render Nodes ─── */
        function renderNodes(domain) {
            const canvas = document.getElementById('flow-canvas');
            const done = getDone(domain.id);
            const total = domain.steps.length;
            const pSize = Math.max(1, Math.ceil(total / PHASES.length));
            canvas.innerHTML = '';
            let lastPhase = -1;

            domain.steps.forEach((step, i) => {
                const phase = Math.min(Math.floor(i / pSize), PHASES.length - 1);
                const isDone = done.includes(i);

                // Phase header
                if (phase !== lastPhase) {
                    lastPhase = phase;
                    const ph = document.createElement('div');
                    ph.className = 'flow-phase';
                    ph.innerHTML = `<div class="flow-phase-line"></div>
                <div class="flow-phase-label">${PHASES[phase]}</div>
                <div class="flow-phase-line"></div>`;
                    canvas.appendChild(ph);
                }

                // Count resources
                const chips = ['courses', 'videos', 'books', 'websites']
                    .filter(t => step[t]?.length > 0)
                    .map(t => `<span class="node-chip">${RES_ICONS[t]} ${step[t].length}</span>`)
                    .join('');

                // Node
                const node = document.createElement('div');
                node.className = 'flow-node' + (isDone ? ' done-node' : '');
                node.dataset.step = i;
                node.style.setProperty('--node-color', domain.color || '#6366f1');
                node.innerHTML = `
          <div class="flow-node-box">
            <div class="node-check">${isDone ? '✓' : ''}</div>
            <div class="node-body">
              <div class="node-step">Step ${i + 1}</div>
              <div class="node-title">${step.title}</div>
              <div class="node-desc">${step.desc}</div>
            </div>
            <div class="node-right">
              <span class="node-dur">⏱ ${step.dur}</span>
              <div class="node-chips">${chips}</div>
            </div>
            <span class="node-arrow">›</span>
          </div>`;
                node.addEventListener('click', () => openDrawer(domain, i));
                canvas.appendChild(node);

                // Connector (not after last)
                if (i < total - 1) {
                    const conn = document.createElement('div');
                    conn.className = 'flow-connector';
                    canvas.appendChild(conn);
                }
            });
        }

        /* ─── Drawer ─── */
        function setupDrawer(domain) {
            const close = () => closeDrawer();
            document.getElementById('btn-close-drawer').onclick = close;
            document.getElementById('drawer-handle').onclick = close;
            document.getElementById('drawer-overlay').onclick = close;

            document.getElementById('btn-mark-done').addEventListener('click', () => {
                if (_activeStep === null) return;
                const newDone = toggleDone(domain.id, _activeStep);
                const isDone = newDone.includes(_activeStep);
                const btn = document.getElementById('btn-mark-done');
                btn.className = 'btn-mark-done' + (isDone ? ' marked' : '');
                btn.textContent = isDone ? '✓ Completed' : '○ Mark Complete';
                const nodeEl = document.querySelector(`.flow-node[data-step="${_activeStep}"]`);
                if (nodeEl) {
                    nodeEl.classList.toggle('done-node', isDone);
                    nodeEl.querySelector('.node-check').textContent = isDone ? '✓' : '';
                }
                refreshProgress(domain);
            });
        }

        function openDrawer(domain, idx) {
            _activeStep = idx;
            const step = domain.steps[idx];
            const isDone = getDone(domain.id).includes(idx);

            // Highlight active node
            document.querySelectorAll('.flow-node').forEach(n => n.classList.remove('active-node'));
            document.querySelector(`.flow-node[data-step="${idx}"]`)?.classList.add('active-node');

            // Fill info
            document.getElementById('drawer-step-num').textContent = `Step ${idx + 1} of ${domain.steps.length}`;
            document.getElementById('drawer-step-title').textContent = step.title;
            document.getElementById('drawer-step-desc').textContent = step.desc;

            const btn = document.getElementById('btn-mark-done');
            btn.className = 'btn-mark-done' + (isDone ? ' marked' : '');
            btn.textContent = isDone ? '✓ Completed' : '○ Mark Complete';

            // Tabs + content
            const types = ['courses', 'videos', 'books', 'websites'];
            const labels = { courses: '🎓 Courses', videos: '▶ Videos', books: '📖 Books', websites: '🌐 Websites' };
            const avail = types.filter(t => step[t]?.length > 0);

            const tabBar = document.getElementById('drawer-tabs');
            const content = document.getElementById('drawer-content');

            tabBar.innerHTML = avail.map((t, i) =>
                `<button class="res-tab${i === 0 ? ' active' : ''}" data-t="${t}">${labels[t]}</button>`
            ).join('');

            content.innerHTML = avail.length > 0
                ? avail.map((t, i) => `
            <div class="res-section${i === 0 ? ' active' : ''}" data-section="${t}">
              ${buildResLinks(step[t], t)}
            </div>`).join('')
                : '<p class="no-res">No resources added yet for this step.</p>';

            // Tab click
            tabBar.querySelectorAll('.res-tab').forEach(b => {
                b.onclick = () => {
                    tabBar.querySelectorAll('.res-tab').forEach(x => x.classList.remove('active'));
                    content.querySelectorAll('.res-section').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    content.querySelector(`.res-section[data-section="${b.dataset.t}"]`)?.classList.add('active');
                };
            });

            // Show drawer
            document.getElementById('res-drawer').classList.add('show');
            document.getElementById('drawer-overlay').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            document.getElementById('res-drawer').classList.remove('show');
            document.getElementById('drawer-overlay').classList.remove('show');
            document.querySelectorAll('.flow-node').forEach(n => n.classList.remove('active-node'));
            document.body.style.overflow = '';
            _activeStep = null;
        }

        function buildResLinks(items, type) {
            if (!items?.length) return '<p class="no-res">No resources yet.</p>';
            return items.map(r => `
      <a href="${r.url || '#'}" target="_blank" rel="noopener"
         class="res-item r-${type}">
        <span class="res-icon">${RES_ICONS[type]}</span>
        <div class="res-info">
          <span class="res-name">${r.name}</span>
          ${r.platform ? `<span class="res-plat">${r.platform}</span>` : ''}
        </div>
        <span class="${r.paid === true ? 'badge-p' : 'badge-f'}">${r.paid === true ? 'Paid' : 'Free'}</span>
        <span class="res-arrow">↗</span>
      </a>`).join('');
        }
    </script>
</body>

</html>
