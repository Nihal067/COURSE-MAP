<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap - CourseMap</title>
    <link rel="icon" type="image/png" href="logo.png?v=1.1">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">


    <style>
        /* ======================================================
   FULL INLINE STYLES â€” No external CSS dependency issues
   ====================================================== */

        /* Reset */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fdf6ec;
            --bg2: #fffaf2;
            --bg3: #f4e9da;
            --border: rgba(47, 34, 26, 0.16);
            --t1: #2f221a;
            --t2: #6b5443;
            --t3: #866e5b;
            --green: #22c55e;
            --purple: #b65a3c;
            --radius: 10px;
        }

        [data-theme="dark"] {
            --bg: #2a1d16;
            --bg2: #34241c;
            --bg3: #3f2b21;
            --border: rgba(248, 237, 225, 0.16);
            --t1: #f8ede1;
            --t2: #d9c5b3;
            --t3: #b89f8d;
            --green: #22c55e;
            --purple: #e0a280;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--t1);
            line-height: 1.6;
            min-height: 100vh;
            /* NO overflow - let page scroll naturally */
        }

        a {
            color: #8f3f2a;
            text-decoration: none;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            outline: none;
        }

        /* â”€â”€ Scrollbar â”€â”€ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(182, 90, 60, 0.3);
            border-radius: 3px;
        }

        .theme-toggle-btn {
            background: rgba(47, 34, 26, 0.06);
            border: 1px solid rgba(47, 34, 26, 0.18);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--t2);
            transition: all 0.2s ease;
        }

        [data-theme="dark"] .theme-toggle-btn {
            background: rgba(248, 237, 225, 0.08);
            border-color: rgba(248, 237, 225, 0.18);
            color: var(--t2);
        }

        .theme-toggle-btn:hover {
            background: rgba(47, 34, 26, 0.12);
            transform: translateY(-1px);
        }

        [data-theme="dark"] .theme-toggle-btn:hover {
            background: rgba(248, 237, 225, 0.14);
        }

        /* ======================================================
   NAV
   ====================================================== */
        .roadmap-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 32px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        /* Logo in roadmap nav */
        .roadmap-nav-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .roadmap-nav-logo {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            overflow: hidden;
            background: #ffffff; /* Match JPEG background */
            object-fit: cover;
            transform: scale(1.25); /* Zoom to push square corners out */
            border: 1.5px solid rgba(182, 90, 60, 0.45);
            box-shadow: 0 0 10px rgba(182, 90, 60, 0.25);
        }

        .roadmap-nav-brand-name {
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(135deg, #d49473, #8f3f2a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: rgba(47, 34, 26, 0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--t2);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.18s;
        }

        .back-btn:hover {
            background: rgba(47, 34, 26, 0.09);
            color: var(--t1);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-username {
            font-size: 13px;
            color: var(--t2);
        }

        .btn-signout {
            padding: 6px 13px;
            font-size: 12px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            border-radius: 6px;
            transition: background 0.18s;
        }

        .btn-signout:hover {
            background: rgba(239, 68, 68, 0.15);
        }

        /* 
   DOMAIN HEADER
    */
        .domain-header {
            padding: 40px 32px 30px;
            background: linear-gradient(135deg, rgba(182, 90, 60, 0.08) 0%, transparent 60%);
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            min-height: auto;
        }

        .domain-header-inner {
            max-width: 820px;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .cat-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(47, 34, 26, 0.06);
            border: 1px solid rgba(47, 34, 26, 0.1);
            margin-bottom: 10px;
        }

        .domain-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
            color: var(--t1) !important;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            min-height: 1.2em;
            line-height: 1.1;
        }

        .domain-meta {
            display: flex;
            gap: 18px;
            color: var(--t2);
            font-size: 13px;
            margin-bottom: 14px;
        }

        .domain-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-enroll {
            padding: 9px 22px;
            background: linear-gradient(135deg, #b65a3c, #8f3f2a);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(182, 90, 60, 0.3);
            transition: all 0.2s;
        }

        .btn-enroll:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 22px rgba(182, 90, 60, 0.45);
        }

        .btn-enroll.enrolled {
            background: rgba(34, 197, 94, 0.1);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, 0.25);
            box-shadow: none;
        }

        /* ======================================================
   PROGRESS BAR
   ====================================================== */
        .prog-row {
            padding: 10px 32px;
            background: rgba(8, 10, 20, 0.95);
            border-bottom: 1px solid rgba(47, 34, 26, 0.05);
        }

        .prog-inner {
            display: flex;
            align-items: center;
            gap: 14px;
            max-width: 820px;
        }

        .prog-label {
            font-size: 12px;
            color: var(--t3);
            min-width: 80px;
        }

        .prog-track {
            flex: 1;
            height: 6px;
            background: rgba(47, 34, 26, 0.07);
            border-radius: 3px;
            overflow: hidden;
        }

        .prog-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--purple), var(--green));
            transition: width 0.5s ease;
            width: 0%;
        }

        .prog-pct {
            font-size: 13px;
            font-weight: 700;
            color: var(--green);
            min-width: 38px;
            text-align: right;
        }

        /* ======================================================
   FLOWCHART CANVAS
   ====================================================== */
        .flow-canvas {
            padding: 40px 32px 240px;
            /* 240px bottom so final nodes are never hidden */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 70vh;
            background: var(--bg);
        }

        /* Phase group header */
        .flow-phase {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 700px;
            margin: 32px 0 4px;
        }

        .flow-phase:first-child {
            margin-top: 0;
        }

        .flow-phase-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .flow-phase-label {
            padding: 3px 14px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--t3);
            white-space: nowrap;
            background: rgba(47, 34, 26, 0.04);
            border: 1px solid var(--border);
        }

        /* Node */
        .flow-node {
            width: 100%;
            max-width: 700px;
            cursor: pointer;
        }

        .flow-node-box {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 15px 18px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-left: 3.5px solid var(--node-color, var(--purple));
            border-radius: var(--radius);
            transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
        }

        .flow-node:hover .flow-node-box {
            background: #131630;
            border-color: rgba(47, 34, 26, 0.14);
            transform: translateX(5px);
            box-shadow: -4px 0 18px rgba(0, 0, 0, 0.4);
        }

        .flow-node.active-node .flow-node-box {
            background: rgba(182, 90, 60, 0.07);
            border-color: var(--node-color, var(--purple));
            box-shadow: 0 0 0 2px rgba(182, 90, 60, 0.15);
        }

        .flow-node.done-node .flow-node-box {
            border-left-color: var(--green);
            background: rgba(34, 197, 94, 0.04);
        }

        .node-check {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid rgba(47, 34, 26, 0.14);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: transparent;
            transition: all 0.18s;
        }

        .done-node .node-check {
            border-color: var(--green);
            background: rgba(34, 197, 94, 0.14);
            color: var(--green);
        }

        .node-body {
            flex: 1;
            min-width: 0;
        }

        .node-step {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--node-color, var(--purple));
            margin-bottom: 2px;
        }

        .done-node .node-step {
            color: var(--green);
        }

        .node-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--t1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .node-desc {
            font-size: 11px;
            color: var(--t2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .node-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            flex-shrink: 0;
        }

        .node-dur {
            font-size: 10px;
            color: var(--t3);
            background: rgba(47, 34, 26, 0.05);
            padding: 2px 9px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .node-chips {
            display: flex;
            gap: 4px;
        }

        .node-chip {
            font-size: 9px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
            background: rgba(47, 34, 26, 0.05);
            border: 1px solid var(--border);
            color: var(--t3);
        }

        .node-arrow {
            font-size: 18px;
            color: var(--t3);
            line-height: 1;
            flex-shrink: 0;
            transition: transform 0.18s, color 0.18s;
        }

        .active-node .node-arrow {
            transform: rotate(90deg);
            color: var(--node-color, var(--purple));
        }

        /* Connector arrow between nodes */
        .flow-connector {
            width: 0;
            height: 28px;
            border-left: 2px dashed rgba(47, 34, 26, 0.09);
            margin: 0 auto;
            position: relative;
        }

        .flow-connector::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: -5px;
            width: 8px;
            height: 8px;
            border-right: 2px solid rgba(47, 34, 26, 0.12);
            border-bottom: 2px solid rgba(47, 34, 26, 0.12);
            transform: rotate(45deg);
        }

        /* ======================================================
   RESOURCE DRAWER
   ====================================================== */
        #drawer-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            z-index: 8000;
        }

        #drawer-overlay.show {
            display: block;
        }

        #res-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9000;
            background: var(--bg2);
            border-top: 1px solid rgba(47, 34, 26, 0.12);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -24px 60px rgba(0, 0, 0, 0.8);
            transform: translateY(100%);
            transition: transform 0.36s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #res-drawer.show {
            transform: translateY(0);
        }

        .drawer-handle {
            width: 40px;
            height: 4px;
            background: rgba(47, 34, 26, 0.16);
            border-radius: 2px;
            margin: 13px auto 0;
            cursor: pointer;
            flex-shrink: 0;
        }

        .drawer-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 13px 28px 12px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(47, 34, 26, 0.07);
        }

        .drawer-info {
            flex: 1;
            min-width: 0;
        }

        .drawer-step-num {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--t3);
            margin-bottom: 3px;
        }

        .drawer-step-title {
            font-size: 19px;
            font-weight: 700;
            color: var(--t1);
            margin-bottom: 4px;
        }

        .drawer-step-desc {
            font-size: 13px;
            color: var(--t2);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .btn-mark-done {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(47, 34, 26, 0.1);
            background: rgba(47, 34, 26, 0.04);
            color: var(--t2);
            transition: all 0.18s;
        }

        .btn-mark-done:hover {
            background: rgba(34, 197, 94, 0.09);
            border-color: rgba(34, 197, 94, 0.28);
            color: var(--green);
        }

        .btn-mark-done.marked {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.28);
            color: var(--green);
        }

        .btn-close-drawer {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-left: 12px;
            background: rgba(47, 34, 26, 0.05);
            border: 1px solid rgba(47, 34, 26, 0.1);
            color: var(--t2);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.18s;
            line-height: 1;
        }

        .btn-close-drawer:hover {
            background: rgba(239, 68, 68, 0.14);
            color: #f87171;
        }

        /* Tabs */
        .drawer-tabs {
            display: flex;
            gap: 4px;
            padding: 10px 28px 0;
            border-bottom: 1px solid rgba(47, 34, 26, 0.07);
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .drawer-tabs::-webkit-scrollbar {
            display: none;
        }

        .res-tab {
            padding: 7px 16px;
            border-radius: 7px 7px 0 0;
            border: 1px solid transparent;
            border-bottom: none;
            background: transparent;
            color: var(--t3);
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.15s;
        }

        .res-tab:hover {
            color: var(--t2);
            background: rgba(47, 34, 26, 0.04);
        }

        .res-tab.active {
            color: var(--t1);
            background: rgba(182, 90, 60, 0.1);
            border-color: rgba(182, 90, 60, 0.28);
        }

        /* Scrollable resource list */
        .drawer-content {
            overflow-y: auto;
            padding: 14px 28px 36px;
            flex: 1;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
        }

        .drawer-content::-webkit-scrollbar {
            width: 4px;
        }

        .drawer-content::-webkit-scrollbar-thumb {
            background: rgba(47, 34, 26, 0.1);
            border-radius: 2px;
        }

        .res-section {
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .res-section.active {
            display: flex;
            animation: fadeUp 0.18s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .res-item {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 12px 14px;
            border-radius: 9px;
            background: rgba(47, 34, 26, 0.03);
            border: 1px solid var(--border);
            text-decoration: none;
            color: var(--t1);
            transition: all 0.15s;
        }

        .res-item:hover {
            background: rgba(47, 34, 26, 0.07);
            transform: translateX(3px);
        }

        .res-item.r-courses:hover {
            border-color: rgba(182, 90, 60, 0.4);
            background: rgba(182, 90, 60, 0.06);
        }

        .res-item.r-videos:hover {
            border-color: rgba(239, 68, 68, 0.4);
            background: rgba(239, 68, 68, 0.06);
        }

        .res-item.r-books:hover {
            border-color: rgba(234, 179, 8, 0.4);
            background: rgba(234, 179, 8, 0.06);
        }

        .res-item.r-websites:hover {
            border-color: rgba(34, 197, 94, 0.4);
            background: rgba(34, 197, 94, 0.06);
        }

        .res-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .res-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }

        .res-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--t1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .res-plat {
            font-size: 11px;
            color: var(--t3);
        }

        .res-arrow {
            font-size: 10px;
            color: var(--t3);
            opacity: 0.4;
            flex-shrink: 0;
        }

        .badge-f {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .badge-p {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            background: rgba(234, 179, 8, 0.09);
            color: #fbbf24;
            border: 1px solid rgba(234, 179, 8, 0.2);
        }

        .no-res {
            font-size: 13px;
            color: var(--t2);
            font-style: italic;
            padding: 10px 0;
        }

        /* â”€â”€ Star Rating Widget â”€â”€ */
        .res-rating {
            display: flex;
            align-items: center;
            gap: 3px;
            margin-top: 5px;
        }

        .star-btn {
            background: none;
            border: none;
            padding: 0;
            font-size: 14px;
            cursor: pointer;
            color: rgba(47, 34, 26, 0.15);
            transition: color 0.15s, transform 0.1s;
            line-height: 1;
        }

        .star-btn:hover,
        .star-btn.on {
            color: #f59e0b !important;
        }

        .star-btn:hover {
            transform: scale(1.25);
        }

        .rating-avg {
            font-size: 11px;
            font-weight: 500;
            opacity: 0.9;
            color: var(--t3);
            margin-left: 5px;
        }

        [data-theme="light"] .star-btn {
            color: rgba(0, 0, 0, 0.15);
        }

        /* â”€â”€ Responsive â”€â”€ */

        @media (max-width: 768px) {
            .roadmap-nav {
                padding: 10px 16px;
                gap: 10px;
            }

            .roadmap-nav-brand {
                position: static;
                transform: none;
                margin-left: auto;
                margin-right: auto;
            }

            .nav-right {
                gap: 6px;
            }

            .nav-username {
                max-width: 110px;
                overflow: hidden;
                white-space: nowrap;
                text-overflow: ellipsis;
            }

            .domain-header {
                padding: 22px 16px 18px;
            }

            .domain-title {
                font-size: 20px;
            }

            .prog-row {
                padding: 8px 16px;
            }

            .flow-canvas {
                padding: 24px 12px 240px;
            }

            .node-desc {
                display: none;
            }

            .drawer-top {
                padding: 10px 16px 10px;
            }

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/data_govt.js"></script>
    <script src="js/data_more.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/quiz_data.js"></script>
    <script src="js/quiz.js"></script>
    <script src="js/share.js"></script>
    <script>
        /* ================================================================
           ROADMAP PAGE LOGIC â€” Complete self-contained inline script
           ================================================================ */

        const RES_ICONS = {
            courses: String.fromCodePoint(0x1F393),
            videos: '\u25B6',
            books: String.fromCodePoint(0x1F4D6),
            websites: String.fromCodePoint(0x1F310)
        };
        const PHASES = ['Fundamentals', 'Core Concepts', 'Intermediate', 'Advanced', 'Specialization'];

        let _domain = null, _activeStep = null;

        /* â”€â”€â”€ Init â”€â”€â”€ */
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                if (!Auth.requireAuth()) return;

                const params = new URLSearchParams(window.location.search);
                const domainId = params.get('domain');
                const domain = (typeof DOMAINS !== 'undefined')
                    ? DOMAINS.find(d => d.id === domainId) : null;

                if (!domain) { window.location.href = 'dashboard.html'; return; }
                _domain = domain;

                const user = Auth.getCurrentUser();
                renderHeader(domain, user);

                // Ensure domain header is visible
                const domainHeader = document.querySelector('.domain-header');
                if (domainHeader) {
                    domainHeader.style.display = 'block';
                    domainHeader.style.opacity = '1';
                }
                const domainTitle = document.getElementById('domain-name-h1');
                if (domainTitle && !domainTitle.textContent) {
                    domainTitle.textContent = domain.name || 'Domain';
                }

                await initEnroll(domain, user);
                renderNodes(domain);
                refreshProgress(domain);
                setupDrawer(domain);

                document.getElementById('btn-signout').onclick = () => Auth.logout();
                const nu = document.getElementById('nav-username');
                if (nu) nu.textContent = user.name;

            } catch (err) {
                console.error('Roadmap init error:', err);
                document.body.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:center;
                      min-height:100vh;background:#080a14;color:#f0f0f5;
                      font-family:Inter,sans-serif;padding:24px;text-align:center;">
            <div>
              <div style="font-size:48px;margin-bottom:16px">!</div>
              <h2 style="margin-bottom:8px">Roadmap failed to load</h2>
              <p style="color:#666;margin-bottom:20px;font-size:14px">${err.message}</p>
              <a href="dashboard.html"
                 style="padding:10px 24px;background:#b65a3c;color:#fff;
                        border-radius:8px;text-decoration:none;font-weight:600">
                Back to Dashboard
              </a>
            </div>
          </div>`;
            }
        });

        /* â”€â”€â”€ Header â”€â”€â”€ */
        function renderHeader(domain, user) {
            const cat = document.getElementById('domain-cat');
            cat.textContent = domain.cat;
            cat.style.color = domain.color;

            document.getElementById('domain-name-h1').textContent = domain.name;
            document.title = domain.name + ' - CourseMap';

            const totalRes = domain.steps.reduce((s, st) =>
                s + (st.courses?.length || 0) + (st.videos?.length || 0)
                + (st.books?.length || 0) + (st.websites?.length || 0), 0);

            document.getElementById('meta-steps').textContent = domain.steps.length + ' Steps';
            document.getElementById('meta-resources').textContent = totalRes + ' Resources';
        }

        /* â”€â”€â”€ Enroll â”€â”€â”€ */
        async function initEnroll(domain, user) {
            const btn = document.getElementById('btn-enroll');
            const key = 'courseMap_enrolled_' + user.email;
            let list = [];

            try {
                const data = await API.getEnrollment();
                list = Array.isArray(data.domainIds) ? data.domainIds : [];
            } catch {
                list = JSON.parse(localStorage.getItem(key) || '[]');
            }
            localStorage.setItem(key, JSON.stringify(list));

            styleEnroll(btn, list.includes(domain.id));

            btn.onclick = async () => {
                const has = btn.classList.contains('enrolled');

                try {
                    if (has) {
                        await API.unenroll(domain.id);
                    } else {
                        await API.enroll(domain.id);
                    }
                } catch {
                    list = JSON.parse(localStorage.getItem(key) || '[]');
                    list = has ? list.filter(x => x !== domain.id) : [...list, domain.id];
                }

                list = JSON.parse(localStorage.getItem(key) || '[]');
                list = has ? list.filter(x => x !== domain.id) : [...new Set([...list, domain.id])];
                localStorage.setItem(key, JSON.stringify(list));
                styleEnroll(btn, !has);
            };
        }
        function styleEnroll(btn, enrolled) {
            btn.textContent = enrolled ? 'Enrolled' : 'Enroll in Path';
            btn.classList.toggle('enrolled', enrolled);
        }

        /* â”€â”€â”€ Progress â”€â”€â”€ */
        function progressKey(domainId) {
            return 'courseMap_progress_' + Auth.getCurrentUser().email + '_' + domainId;
        }
        function getDone(domainId) {
            const d = localStorage.getItem(progressKey(domainId));
            return d ? JSON.parse(d) : [];
        }
        function toggleDone(domainId, idx) {
            const d = getDone(domainId);
            const i = d.indexOf(idx);
            if (i > -1) d.splice(i, 1); else d.push(idx);
            localStorage.setItem(progressKey(domainId), JSON.stringify(d));
            return d;
        }
        function refreshProgress(domain) {
            const done = getDone(domain.id);
            const total = domain.steps.length;
            const pct = total > 0 ? Math.round(done.length / total * 100) : 0;
            document.getElementById('prog-fill').style.width = pct + '%';
            document.getElementById('prog-pct').textContent = pct + '%';
            document.getElementById('prog-label').textContent = done.length + ' / ' + total + ' done';
        }

        /* â”€â”€â”€ Render Nodes â”€â”€â”€ */
        function renderNodes(domain) {
            const canvas = document.getElementById('flow-canvas');
            const done = getDone(domain.id);
            const total = domain.steps.length;
            const pSize = Math.max(1, Math.ceil(total / PHASES.length));
            canvas.innerHTML = '';
            let lastPhase = -1;

            domain.steps.forEach((step, i) => {
                const phase = Math.min(Math.floor(i / pSize), PHASES.length - 1);
                const isDone = done.includes(i);

                // Phase header
                if (phase !== lastPhase) {
                    lastPhase = phase;
                    const ph = document.createElement('div');
                    ph.className = 'flow-phase';
                    ph.innerHTML = `<div class="flow-phase-line"></div>
                <div class="flow-phase-label">${PHASES[phase]}</div>
                <div class="flow-phase-line"></div>`;
                    canvas.appendChild(ph);
                }

                // Count resources
                const chips = ['courses', 'videos', 'books', 'websites']
                    .filter(t => step[t]?.length > 0)
                    .map(t => `<span class="node-chip">${RES_ICONS[t]} ${step[t].length}</span>`)
                    .join('');

                // Node
                const node = document.createElement('div');
                node.className = 'flow-node' + (isDone ? ' done-node' : '');
                node.dataset.step = i;
                node.style.setProperty('--node-color', domain.color || '#b65a3c');
                node.innerHTML = `
          <div class="flow-node-box">
            <div class="node-check">${isDone ? '\u2713' : ''}</div>
            <div class="node-body">
              <div class="node-step">Step ${i + 1}</div>
              <div class="node-title">${step.title}</div>
              <div class="node-desc">${step.desc}</div>
            </div>
            <div class="node-right">
              <span class="node-dur">Time: ${step.dur}</span>
              <div class="node-chips">${chips}</div>
            </div>
            <span class="node-arrow">></span>
          </div>`;
                node.addEventListener('click', () => openDrawer(domain, i));
                canvas.appendChild(node);

                // Connector (not after last)
                if (i < total - 1) {
                    const conn = document.createElement('div');
                    conn.className = 'flow-connector';
                    canvas.appendChild(conn);
                }
            });
        }

        /* Drawer */
        function setupDrawer(domain) {
            const close = () => closeDrawer();
            document.getElementById('btn-close-drawer').onclick = close;
            document.getElementById('drawer-handle').onclick = close;
            document.getElementById('drawer-overlay').onclick = close;

            document.getElementById('btn-mark-done').addEventListener('click', () => {
                if (_activeStep === null) return;
                const stepIdx = _activeStep;
                const alreadyDone = getDone(domain.id).includes(stepIdx);

                if (alreadyDone) {
                    toggleDone(domain.id, stepIdx);
                    const btn = document.getElementById('btn-mark-done');
                    btn.className = 'btn-mark-done';
                    btn.textContent = 'Mark Complete';
                    const nodeEl = document.querySelector(`.flow-node[data-step="${stepIdx}"]`);
                    if (nodeEl) {
                        nodeEl.classList.remove('done-node');
                        const check = nodeEl.querySelector('.node-check');
                        if (check) check.textContent = '';
                    }
                    refreshProgress(domain);
                    return;
                }

                const markStepDone = () => {
                    toggleDone(domain.id, stepIdx);
                    const btn = document.getElementById('btn-mark-done');
                    if (btn) {
                        btn.className = 'btn-mark-done marked';
                        btn.textContent = 'Completed';
                    }
                    const nodeEl = document.querySelector(`.flow-node[data-step="${stepIdx}"]`);
                    if (nodeEl) {
                        nodeEl.classList.add('done-node');
                        const check = nodeEl.querySelector('.node-check');
                        if (check) check.textContent = '\u2713';
                    }
                    refreshProgress(domain);
                };

                if (typeof openStepQuiz === 'function') {
                    const stepName = domain.steps[stepIdx]?.title || `Step ${stepIdx + 1}`;
                    openStepQuiz(
                        domain.id,
                        stepIdx,
                        stepName,
                        () => {
                            markStepDone();
                            const afterDone = getDone(domain.id);
                            if (afterDone.length === domain.steps.length && typeof openDomainQuiz === 'function') {
                                setTimeout(() => {
                                    openDomainQuiz(
                                        domain,
                                        () => showToast('Domain quiz passed.'),
                                        () => showToast('Domain quiz not passed yet.')
                                    );
                                }, 200);
                            }
                        },
                        () => showToast('Step quiz not passed yet.')
                    );
                    return;
                }

                markStepDone();
            });
        }

        function openDrawer(domain, idx) {
            _activeStep = idx;
            const step = domain.steps[idx];
            if (!step) return;

            const isDone = getDone(domain.id).includes(idx);
            document.querySelectorAll('.flow-node').forEach(n => n.classList.remove('active-node'));
            document.querySelector(`.flow-node[data-step="${idx}"]`)?.classList.add('active-node');

            document.getElementById('drawer-step-num').textContent = `Step ${idx + 1} of ${domain.steps.length}`;
            document.getElementById('drawer-step-title').textContent = step.title || '';
            document.getElementById('drawer-step-desc').textContent = step.desc || '';

            const btn = document.getElementById('btn-mark-done');
            btn.className = 'btn-mark-done' + (isDone ? ' marked' : '');
            btn.textContent = isDone ? 'Completed' : 'Mark Complete';

            const types = ['courses', 'videos', 'books', 'websites'];
            const labels = {
                courses: `${RES_ICONS.courses} Courses`,
                videos: `${RES_ICONS.videos} Videos`,
                books: `${RES_ICONS.books} Books`,
                websites: `${RES_ICONS.websites} Websites`
            };
            const avail = types.filter(t => step[t]?.length > 0);

            const tabBar = document.getElementById('drawer-tabs');
            const content = document.getElementById('drawer-content');

            tabBar.innerHTML = avail.map((t, i) =>
                `<button class="res-tab${i === 0 ? ' active' : ''}" data-t="${t}">${labels[t]}</button>`
            ).join('');

            content.innerHTML = avail.length > 0
                ? avail.map((t, i) => `
            <div class="res-section${i === 0 ? ' active' : ''}" data-section="${t}">
              ${buildResLinks(step[t], t)}
            </div>`).join('')
                : '<p class="no-res">No resources added yet for this step.</p>';

            tabBar.querySelectorAll('.res-tab').forEach(b => {
                b.onclick = () => {
                    tabBar.querySelectorAll('.res-tab').forEach(x => x.classList.remove('active'));
                    content.querySelectorAll('.res-section').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    content.querySelector(`.res-section[data-section="${b.dataset.t}"]`)?.classList.add('active');
                };
            });

            loadRatings(domain.id, idx);
            document.getElementById('res-drawer').classList.add('show');
            document.getElementById('drawer-overlay').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            document.getElementById('res-drawer').classList.remove('show');
            document.getElementById('drawer-overlay').classList.remove('show');
            document.querySelectorAll('.flow-node').forEach(n => n.classList.remove('active-node'));
            document.body.style.overflow = '';
            _activeStep = null;
        }

        function buildResLinks(items, type) {
            if (!items?.length) return '<p class="no-res">No resources yet.</p>';
            return items.map(r => `
      <div class="res-item-wrap">
        <a href="${r.url || '#'}" target="_blank" rel="noopener" class="res-item r-${type}">
          <span class="res-icon">${RES_ICONS[type]}</span>
          <div class="res-info">
            <span class="res-name">${r.name || 'Untitled resource'}</span>
            ${r.platform ? `<span class="res-plat">${r.platform}</span>` : ''}
          </div>
          <span class="${(() => {
                let isPaid = r.paid === true;
                if (!isPaid && r.url) {
                    const paidDoms = ['amazon.', 'manning.com', 'wiley.com', 'udemy.com', 'linkedin.com/learning', 'edx.org', 'bpbonline.com', 'peachpit.com', 'routledge.com', 'oreilly.com', 'packtpub.com'];
                    isPaid = paidDoms.some(d => r.url.toLowerCase().includes(d));
                }
                return isPaid ? 'badge-p' : 'badge-f';
            })()}">${(() => {
                let isPaid = r.paid === true;
                if (!isPaid && r.url) {
                    const paidDoms = ['amazon.', 'manning.com', 'wiley.com', 'udemy.com', 'linkedin.com/learning', 'edx.org', 'bpbonline.com', 'peachpit.com', 'routledge.com', 'oreilly.com', 'packtpub.com'];
                    isPaid = paidDoms.some(d => r.url.toLowerCase().includes(d));
                }
                return isPaid ? 'Paid' : 'Free';
            })()}</span>
          <span class="res-arrow">↗</span>
        </a>
        <div class="res-rating" data-url="${r.url || ''}">
          ${[1, 2, 3, 4, 5].map(s => `<button class="star-btn" data-star="${s}" title="${s} star">★</button>`).join('')}
          <span class="rating-avg" style="opacity:0.6;">(No ratings yet)</span>
        </div>
      </div>`).join('');
        }

        /* ── Local ratings storage key ── */
        function ratingsKey(domainId, stepIdx) {
            return 'cm_ratings_' + domainId + '_' + stepIdx;
        }
        function getLocalRatings(domainId, stepIdx) {
            try { return JSON.parse(localStorage.getItem(ratingsKey(domainId, stepIdx)) || '{}'); }
            catch { return {}; }
        }
        function saveLocalRating(domainId, stepIdx, url, stars) {
            const map = getLocalRatings(domainId, stepIdx);
            map[url] = stars;
            try { localStorage.setItem(ratingsKey(domainId, stepIdx), JSON.stringify(map)); } catch {}
        }

        async function loadRatings(domainId, stepIdx) {
            /* Try to fetch server ratings; fall back to localStorage. */
            let serverRatings = {};
            let backendOk = false;
            if (typeof API !== 'undefined' && typeof API.getRatings === 'function') {
                try {
                    const data = await API.getRatings(domainId, stepIdx);
                    serverRatings = data?.ratings || {};
                    backendOk = true;
                } catch { /* backend offline — will use localStorage */ }
            }

            const localRatings = getLocalRatings(domainId, stepIdx);

            document.querySelectorAll('.res-rating').forEach(widget => {
                const url = widget.dataset.url;
                if (!url) return;

                /* Determine current user's rating: prefer server, fall back to local */
                const serverInfo = serverRatings[url] || {};
                const localStars = localRatings[url] || 0;
                const userStars = backendOk ? (serverInfo.userStars || 0) : localStars;
                const avg = serverInfo.avg || 0;
                const count = serverInfo.count || 0;

                /* Paint stars */
                widget.querySelectorAll('.star-btn').forEach(btn => {
                    btn.classList.toggle('on', Number(btn.dataset.star) <= userStars);
                });

                /* Update avg label */
                const avgEl = widget.querySelector('.rating-avg');
                if (avgEl) {
                    if (backendOk && count > 0) {
                        avgEl.textContent = `Avg ${avg.toFixed(1)} ★ (${count})`;
                        avgEl.style.opacity = '1';
                    } else if (!backendOk && localStars > 0) {
                        avgEl.textContent = `Your rating: ${localStars}/5`;
                        avgEl.style.opacity = '1';
                    } else {
                        avgEl.textContent = '(No ratings yet)';
                        avgEl.style.opacity = '0.6';
                    }
                }

                /* Attach click handlers — always, regardless of backend */
                widget.querySelectorAll('.star-btn').forEach(btn => {
                    btn.onclick = async (e) => {
                        e.stopPropagation();
                        const s = Number(btn.dataset.star);

                        /* Optimistic UI update */
                        widget.querySelectorAll('.star-btn').forEach(b => {
                            b.classList.toggle('on', Number(b.dataset.star) <= s);
                        });
                        const avgEl2 = widget.querySelector('.rating-avg');
                        if (avgEl2) { avgEl2.textContent = `Your rating: ${s}/5`; avgEl2.style.opacity = '1'; }

                        /* Persist locally first */
                        saveLocalRating(domainId, stepIdx, url, s);

                        /* Try to sync to backend */
                        if (typeof API !== 'undefined' && typeof API.submitRating === 'function') {
                            try {
                                await API.submitRating(domainId, stepIdx, url, s);
                            } catch { /* saved locally; backend sync will retry next time */ }
                        }
                    };
                });
            });
        }

        function showToast(message) {
            let toast = document.getElementById('error-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'error-toast';
                toast.style.position = 'fixed';
                toast.style.bottom = '20px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.padding = '8px 14px';
                toast.style.borderRadius = '8px';
                toast.style.background = 'rgba(0,0,0,0.8)';
                toast.style.color = '#fff';
                toast.style.fontSize = '13px';
                toast.style.zIndex = '10000';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.style.display = 'block';
            clearTimeout(showToast._timer);
            showToast._timer = setTimeout(() => { toast.style.display = 'none'; }, 2200);
        }
    </script>

</body>

</html>
